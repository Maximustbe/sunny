<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Наш дневник</title>

    <!-- Шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="hero">

    <img src="images/girl.jpg" class="hero-image" alt="Фото">

    <div class="overlay">

        <h1>Наш дневник</h1>

        <p class="subtitle">
            Некоторые моменты хочется сохранить навсегда.
        </p>

        <button id="musicButton">
            ♫ Включить музыку
        </button>

    </div>

</header>

<main class="content">

    <section id="notes"></section>

</main>

<audio id="music" loop>
    <source src="music/music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
